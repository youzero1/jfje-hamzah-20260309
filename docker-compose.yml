version: '3.8'

services:
  jfje:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jfje-app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=./data/notes.db
      - NEXT_PUBLIC_APP_NAME=jfje
    volumes:
      - jfje-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/notes']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  jfje-data:
    driver: local
